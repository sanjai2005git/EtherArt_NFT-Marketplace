---
- name: Install Docker
  hosts: webservers
  become: yes
  tasks:
    - name: Update apt
      apt:
        update_cache: yes
    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes
